services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stocksentiment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stocksentiment" ]
      interval: 10s
      retries: 5

volumes:
  postgres_data:
